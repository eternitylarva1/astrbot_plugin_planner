<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: transparent;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px 24px 18px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
            width: min(96vw, 900px);
            min-height: min(96vh, 1680px);
            aspect-ratio: 1 / 2;
            margin: 0 auto;
            color: #1f2937;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .title {
            font-size: 46px;
            font-weight: 700;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-badge {
            background: #eef2ff;
            color: #3730a3;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 22px;
            font-weight: 700;
        }
        .tasks-container {
            min-height: 0;
            flex: 1;
            padding-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .timeline-item {
            display: flex;
            align-items: stretch;
            gap: 14px;
            flex: 1;
            position: relative;
        }
        .timeline-time {
            width: 20%;
            text-align: center;
            font-size: 80px;
            color: #374151;
            font-weight: 700;
            padding-top: 4px;
        }
        .timeline-time-end {
            margin-top: 4px;
            font-size: 50px;
            color: #999;
        }
        .timeline-dot {
            width: 16px;
            min-width: 16px;
            border-radius: 50%;
            border: 3px solid #667eea;
            position: relative;
            margin-top: 12px;
            height: 16px;
        }
        .timeline-dot::after {
            content: "";
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: calc(100% + 20px);
            background: #eceff5;
        }
        .timeline-item:last-child .timeline-dot::after {
            display: none;
        }
        .timeline-card {
            flex: 1;
            height: 100%;
            padding: 24px 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
        }
        .task-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task-emoji {
            font-size: 34px;
        }
        .task-name {
            font-size: 38px;
            color: #111827;
            font-weight: 700;
            flex: 1;
        }
        .task-duration {
            font-size: 22px;
            color: #374151;
            background: rgba(0,0,0,0.05);
            padding: 7px 14px;
            border-radius: 12px;
            font-weight: 700;
        }
        .task-status {
            font-size: 30px;
        }
        .stats {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 2px solid #f0f0f0;
        }
        .progress-bar {
            height: 16px;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-label {
            font-size: 24px;
            color: #4b5563;
            font-weight: 700;
        }
        .stats-value {
            font-size: 34px;
            font-weight: 600;
            color: #111827;
        }
        .free-hint {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            color: white;
            padding: 14px 22px;
            border-radius: 22px;
            font-size: 24px;
            font-weight: 700;
        }
        .footer {
            margin-top: 10px;
            text-align: center;
            font-size: 18px;
            color: #b5b8c2;
        }
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 0;
            }
            .container {
                width: 100vw;
                min-height: 100vh;
                aspect-ratio: auto;
                border-radius: 0;
                padding: 22px 16px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .title {
                font-size: 30px;
            }
            .task-name {
                font-size: 20px;
            }
            .stats-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

        <div class="header">

                    <div class="task-content">

            </div>
        
        </div>
        <div class="stats">

                <div class="progress-fill" style="width: 17%;"></div>

</body>
</html>
